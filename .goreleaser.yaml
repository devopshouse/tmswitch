version: 2

project_name: tmswitch

before:
  hooks:
    - go test ./...

builds:
  - id: tmswitch-darwin
    main: .
    binary: tmswitch
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.appVersion={{ .Version }}
  - id: tmswitch-linux
    main: .
    binary: tmswitch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.appVersion={{ .Version }}

archives:
  - id: darwin-archive
    ids:
      - tmswitch-darwin
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
  - id: linux-archive
    ids:
      - tmswitch-linux
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

changelog:
  use: git

release:
  github:
    owner: devopshouse
    name: tmswitch

homebrew_casks:
  - name: tmswitch
    ids:
      - darwin-archive
    binaries:
      - tmswitch
    repository:
      owner: devopshouse
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/devopshouse/tmswitch
    description: Switch between different versions of Terramate
    license: MIT
    url:
      verified: github.com/devopshouse/tmswitch/
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tmswitch"]
          end
