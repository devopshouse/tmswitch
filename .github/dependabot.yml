version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
      time: "07:00"
    commit-message:
      prefix: "go:"
    labels:
      - golang
      - dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "07:00"
    commit-message:
      prefix: "gh-actions:"
    labels:
      - gh-actions
      - dependencies
