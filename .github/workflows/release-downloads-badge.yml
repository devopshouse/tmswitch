name: Update release downloads badge

on:
  workflow_dispatch:
  release:
    types: [published]
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update_badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Calculate release asset downloads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          total=$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/releases?per_page=100" \
            | jq '[.[].assets[]?.download_count] | add // 0'
          )

          cat > .github/badges/release-asset-downloads.json <<EOF
          {
            "schemaVersion": 1,
            "label": "release asset downloads",
            "message": "${total}",
            "color": "blue"
          }
          EOF

      - name: Commit updated badge
        run: |
          if git diff --quiet -- .github/badges/release-asset-downloads.json; then
            echo "Badge is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/release-asset-downloads.json
          git commit -m "chore: update release downloads badge [skip ci]"
          git push
