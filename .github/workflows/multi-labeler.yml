on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, ready_for_review]
    branches: [main] # zizmor: ignore[dangerous-triggers]

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write
  checks: write

jobs:
  labeler:
    name: Multi Labeler
    runs-on: ubuntu-latest
    steps:
      - uses: fuxingloh/multi-labeler@v4
